<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echory</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cormorant Garamond', serif;
        }

        body {
            background-color: #F5ECD7;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 390px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 48px;
            color: #2C1810;
            letter-spacing: 4px;
        }

        .header p {
            font-style: italic;
            font-size: 16px;
            color: #8B6F47;
            margin-top: 4px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #EDD9B0;
            border-radius: 24px;
            padding: 12px 20px;
            width: 100%;
            gap: 10px;
            border: 1.5px solid #C4A882;
        }

        .search-bar input {
            border: none;
            background: transparent;
            font-size: 16px;
            color: #2C1810;
            width: 100%;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
        }

        .search-bar input::placeholder {
            color: #8B6F47;
        }

        .vinyl-container {
            position: relative;
            width: 240px;
            height: 240px;
        }

        .vinyl {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle,
                #1a1a1a 0px,
                #1a1a1a 2px,
                #2C1810 3px,
                #2C1810 6px
            );
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 4s linear infinite paused;
            box-shadow: 0 8px 32px rgba(44, 24, 16, 0.3);
        }

        .vinyl.spinning {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-label {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #EDD9B0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            overflow: hidden;
        }

        .vinyl-label img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            display: none;
        }

        .vinyl-label span {
            font-size: 11px;
            color: #2C1810;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .vinyl-label small {
            font-size: 8px;
            color: #8B6F47;
            letter-spacing: 1px;
        }

        .vinyl-hole {
            width: 10px;
            height: 10px;
            background: #F5ECD7;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .song-info {
            text-align: center;
        }

        .song-info h2 {
            font-size: 24px;
            color: #2C1810;
            font-weight: 600;
        }

        .song-info p {
            font-size: 15px;
            color: #8B6F47;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #EDD9B0;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #2C1810;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        .ctrl-btn.play {
            width: 60px;
            height: 60px;
            background: #3D2B1F;
            color: #F5ECD7;
            font-size: 20px;
        }

        .lyrics-box {
            background: #EDD9B0;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lyric-line {
            font-size: 16px;
            color: #8B6F47;
            font-style: italic;
        }

        .lyrics-box a {
            color: #2C1810;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid #8B6F47;
            padding-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ECHORY</h1>
            <p>your personal vinyl player</p>
        </div>

        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search for a song...">
        </div>

        <div class="vinyl-container">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-label" id="vinylLabel">
                    <img id="albumArt" src="">
                    <span id="vinylText">ECHORY</span>
                    <small id="vinylSide">SIDE A</small>
                </div>
                <div class="vinyl-hole"></div>
            </div>
        </div>

        <div class="song-info">
            <h2 id="songName">I Saw Your Face</h2>
            <p id="artistName">Malcolm Todd</p>
        </div>

        <div class="controls">
            <button class="ctrl-btn" onclick="prevSong()">|◁</button>
            <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="nextSong()">▷|</button>
        </div>

        <div class="lyrics-box" id="lyricsBox">
            <p class="lyric-line">Search for a song to see lyrics</p>
        </div>
    </div>

    <script>
        let isPlaying = false;

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            const vinyl = document.getElementById('vinyl');
            if (isPlaying) {
                btn.textContent = '⏸';
                vinyl.classList.add('spinning');
            } else {
                btn.textContent = '▶';
                vinyl.classList.remove('spinning');
            }
        }

        async function searchSong() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            document.getElementById('songName').textContent = 'Loading...';
            document.getElementById('artistName').textContent = '';

            try {
                const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                document.getElementById('songName').textContent = data.name;
                document.getElementById('artistName').textContent = data.artist;

                if (data.album_art) {
                    const art = document.getElementById('albumArt');
                    const text = document.getElementById('vinylText');
                    const side = document.getElementById('vinylSide');
                    art.src = data.album_art;
                    art.style.display = 'block';
                    text.style.display = 'none';
                    side.style.display = 'none';
                }

                const lyricsRes = await fetch(`/lyrics?q=${encodeURIComponent(data.name + ' ' + data.artist)}`);
                const lyricsData = await lyricsRes.json();

                document.getElementById('lyricsBox').innerHTML = `
                    <p class="lyric-line">Found on Genius:</p>
                    <a href="${lyricsData.url}" target="_blank">${lyricsData.title}</a>
                    <p class="lyric-line" style="font-size: 13px; margin-top: 8px;">Click above to read full lyrics</p>
                `;

            } catch (err) {
                document.getElementById('songName').textContent = 'Song not found';
            }
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchSong();
        });

        function prevSong() {}
        function nextSong() {}
    </script>
</body>
</html>
